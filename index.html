<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="description" content="Gestión inteligente de lista de compra compartida con sugerencias basadas en histórico" />
    <meta name="theme-color" content="#0ea5e9" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lista Compra" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lista de Compra Inteligente" />
    <meta property="og:description" content="Gestión inteligente de lista de compra con sugerencias basadas en histórico" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="Lista de Compra Inteligente" />
    <meta property="twitter:description" content="Gestión inteligente de lista de compra con sugerencias basadas en histórico" />
    
    <title>Lista de Compra Inteligente</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Registro del Service Worker -->
    <script>
      // Registrar Service Worker para PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then((registration) => {
              console.log('✅ Service Worker registrado:', registration.scope)
              
              // Verificar actualizaciones cada hora
              setInterval(() => {
                registration.update()
              }, 60 * 60 * 1000)
            })
            .catch((error) => {
              console.error('❌ Error al registrar Service Worker:', error)
            })
        })
      }

      // Detectar si se puede instalar la PWA
      let deferredPrompt
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevenir el mini-infobar de Chrome
        e.preventDefault()
        // Guardar el evento para usarlo después
        deferredPrompt = e
        console.log('💡 PWA instalable detectada')
        
        // Opcional: Mostrar un botón de instalación personalizado
        // Puedes implementar esto en tu UI si quieres
      })

      // Detectar cuando la PWA es instalada
      window.addEventListener('appinstalled', () => {
        console.log('✅ PWA instalada correctamente')
        deferredPrompt = null
      })
    </script>
  </body>
</html>
